spring:
  application:
    name: ms-cliente
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  datasource:
    url: jdbc:postgresql://postgres:5432/cliente_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false
  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: true
      retry:
        initial-interval: 2000
        max-attempts: 6
        multiplier: 1.5
    discovery:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://registry-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: your-super-secret-key-that-is-at-least-256-bits-long-for-hs256-to-work-properly-12345
  expiration: 3600000

server:
  port: 8082
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.transporte.cliente: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
