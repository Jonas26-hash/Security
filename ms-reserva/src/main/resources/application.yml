spring:
  application:
    name: ms-reserva
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  datasource:
    url: jdbc:postgresql://postgres:5432/reserva_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false
  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: true
    discovery:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://registry-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

server:
  port: 8083
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.transporte.reserva: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
