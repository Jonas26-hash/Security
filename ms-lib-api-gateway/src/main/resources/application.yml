spring:
  application:
    name: ms-lib-api-gateway
  cloud:
    gateway:
      routes:
        - id: cliente-auth
          uri: http://ms-cliente:8082
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        - id: cliente-service
          uri: http://ms-cliente:8082
          predicates:
            - Path=/cliente/**
          filters:
            - StripPrefix=0

        - id: reserva-service
          uri: http://ms-reserva:8083
          predicates:
            - Path=/reserva/**
          filters:
            - StripPrefix=0

    discovery:
      enabled: false

  redis:
    host: redis
    port: 6379
    timeout: 60000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

jwt:
  secret: your-super-secret-key-that-is-at-least-256-bits-long-for-hs256-to-work-properly-12345

ip:
  whitelist: 192.168.1.10,192.168.1.11,127.0.0.1,localhost

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://registry-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    enabled: true

logging:
  level:
    root: INFO
    com.transporte.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
